<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タスク管理</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Baloo 2", "Meiryo", sans-serif;
      background: #f7f7f7;
      color: #333;
    }

    .container {
      padding: 20px 28px;
    }

    .form-area {
      background: #ffffff;
      padding: 10px 10px 0.2px 10px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 18px;
    }

    .form-area h2 {
      margin-top: 0;
      margin-bottom: 2px;
      font-size: 18px;
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    input,
    select,
    textarea,
    button {
      font-family: inherit;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
    }

    select {
      min-width: 140px;
      flex-shrink: 0;
    }
    input[type="text"] {
      min-width: 0;
      flex: 1;
    }

    input[type="checkbox"] {
      min-width: auto;
      flex: none;
      width: 16px;
      height: 16px;
    }

    textarea {
      width: 100%;
      min-height: 70px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 9px 12px;
      cursor: pointer;
      background: #5367aa;
      color: white;
    }

    button:hover {
      opacity: 0.85;
    }

    .cancel-btn {
      background: #888;
    }

    .board {
      display: grid;
      grid-template-columns: 2fr 1.5fr 1.4fr;
      gap: 18px;
    }

    .column {
      min-height: 420px;
      border-radius: 14px;
      padding: 0px 16px;
      border: 3px solid transparent;
    }

    .today {
      background: #ffcbbb;
      border-color: #ffc09c;
    }

    .week {
      background: #ffe2bd;
      border-color: #ffd49f;
    }

    .month {
      background: #fff0cf;
      border-color: #ffe8bc;
    }

    .column h2 {
      margin: 0 0 8px;
      color: #5a4724;
      font-size: 25px;
      font-weight: 800;
      font-family: "Comic Sans MS", "Meiryo", sans-serif;
      text-align: center;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 12px;
      padding: 3px;
      box-shadow: 0 1px 5px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(0, 0, 0, 0.08);
      position: relative;
    }

  .done-image {
    position: absolute;
    top: 50%;
    right: 50%;
    transform: translate(-50%, -50%);
    width: 96px;
    height: 96px;
    pointer-events: none;
    animation: popImage 1s ease-out forwards;
    z-index: 10;
  }

  @keyframes popImage {
    0% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.5);
    }
    10% {
      opacity: 0.8;
      transform: translate(-50%, -50%) scale(0.5);
    }
    30% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.15);
    }
    70% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    90% {
      opacity: 0.5;
      transform: translate(-50%, -50%) scale(1);
    }
   100% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(1);
    }
  }

    .task-card.done {
      opacity: 1;
    }

    .task-card.done .task-title,
    .task-card.done .task-memo {
      text-decoration: line-through;
      opacity: 0.55;
    }

    .task-header {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-bottom: 2px;
    }

    .task-title {
      font-weight: bold;
      word-break: break-word;
    }

    .task-body {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-left: 28px;
    }

    .task-memo {
      flex: 1;
      margin: 0;
      font-size: 13px;
      color: #555;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .task-actions {
      display: flex;
      gap: 4px;
      justify-content: flex-end;
      flex-wrap: nowrap;
      flex-shrink: 0;
    }

    .small-btn {
      font-size: 10px;
      padding: 2px 8px;
    }

    .edit-btn {
      background: #2f6f9f;
    }

    .delete-btn {
      background: #c44;
    }

    .move-btn {
      background: #7c7b73;
    }

    .empty-message {
      text-align: center;
      color: #777;
      font-size: 13px;
      padding: 20px 0;
    }

    @media (max-width: 900px) {
      .board {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
  </header>

  <main class="container">
    <section class="form-area">
      <h2 id="formTitle">タスク登録</h2>
      <div class="form-row">
        <select id="deadline">
          <option value="today">今日中</option>
          <option value="week">今週中</option>
          <option value="month">今月中</option>
        </select>
        <input type="text" id="title" placeholder="タスク" />
      </div>
      <textarea id="memo" placeholder="メモ"></textarea>
      <div class="form-row">
        <button id="saveBtn" onclick="saveTask()">登録</button>
        <button id="cancelBtn" class="cancel-btn" onclick="cancelEdit()" style="display:none;">キャンセル</button>
      </div>
    </section>

    <section class="board">
      <div class="column today">
        <h2>Today</h2>
        <div id="todayList" class="task-list"></div>
      </div>

      <div class="column week">
        <h2>Week</h2>
        <div id="weekList" class="task-list"></div>
      </div>

      <div class="column month">
        <h2>Month</h2>
        <div id="monthList" class="task-list"></div>
      </div>
    </section>
  </main>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
    let editingId = null;

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function saveTask() {
      const deadline = document.getElementById("deadline").value;
      const title = document.getElementById("title").value.trim();
      const memo = document.getElementById("memo").value.trim();

      if (!title) {
        alert("タスクを入力してください");
        return;
      }

      if (editingId === null) {
        const sameDeadlineTasks = tasks.filter(task => task.deadline === deadline);
        const newTask = {
          id: Date.now(),
          deadline: deadline,
          title: title,
          memo: memo,
          done: false,
          order: sameDeadlineTasks.length
        };
        tasks.push(newTask);
      } else {
        const task = tasks.find(task => task.id === editingId);
        if (task) {
          const oldDeadline = task.deadline;
          task.deadline = deadline;
          task.title = title;
          task.memo = memo;

          if (oldDeadline !== deadline) {
            task.order = tasks.filter(t => t.deadline === deadline && t.id !== task.id).length;
          }
        }
        editingId = null;
        document.getElementById("formTitle").textContent = "タスク登録";
        document.getElementById("saveBtn").textContent = "登録";
        document.getElementById("cancelBtn").style.display = "none";
      }

      clearForm();
      normalizeOrders();
      saveTasks();
      renderTasks();
    }

    function clearForm() {
      document.getElementById("deadline").value = "today";
      document.getElementById("title").value = "";
      document.getElementById("memo").value = "";
    }

    function cancelEdit() {
      editingId = null;
      clearForm();
      document.getElementById("formTitle").textContent = "タスク登録";
      document.getElementById("saveBtn").textContent = "登録";
      document.getElementById("cancelBtn").style.display = "none";
    }

    function editTask(id) {
      const task = tasks.find(task => task.id === id);
      if (!task) return;

      editingId = id;
      document.getElementById("deadline").value = task.deadline;
      document.getElementById("title").value = task.title;
      document.getElementById("memo").value = task.memo;
      document.getElementById("formTitle").textContent = "タスク更新";
      document.getElementById("saveBtn").textContent = "更新";
      document.getElementById("cancelBtn").style.display = "inline-block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteTask(id) {
      if (!confirm("このタスクを削除しますか？")) return;
      tasks = tasks.filter(task => task.id !== id);
      normalizeOrders();
      saveTasks();
      renderTasks();
    }

    function toggleDone(id) {
      const task = tasks.find(task => task.id === id);
      if (task) {
        task.done = !task.done;
        saveTasks();
        renderTasks();

        if (task.done) {
          showDoneImage(id);
        }
      }
    }

    function showDoneImage(id) {
      const card = document.querySelector(`[data-task-id="${id}"]`);
      if (!card) return;

      const img = document.createElement("img");
        img.src = "done-stamp.png";
        img.className = "done-image";
        img.alt = "done";

        card.appendChild(img);

      setTimeout(() => {
        img.remove();
      }, 500);
    }

    function moveTask(id, direction) {
      const task = tasks.find(task => task.id === id);
      if (!task) return;

      const group = tasks
        .filter(t => t.deadline === task.deadline)
        .sort((a, b) => a.order - b.order);

      const currentIndex = group.findIndex(t => t.id === id);
      const targetIndex = currentIndex + direction;

      if (targetIndex < 0 || targetIndex >= group.length) return;

      const targetTask = group[targetIndex];
      const tempOrder = task.order;
      task.order = targetTask.order;
      targetTask.order = tempOrder;

      normalizeOrders();
      saveTasks();
      renderTasks();
    }

    function normalizeOrders() {
      ["today", "week", "month"].forEach(deadline => {
        const group = tasks
          .filter(task => task.deadline === deadline)
          .sort((a, b) => a.order - b.order);

        group.forEach((task, index) => {
          task.order = index;
        });
      });
    }

    function renderTasks() {
      renderColumn("today", "todayList");
      renderColumn("week", "weekList");
      renderColumn("month", "monthList");
    }

    function renderColumn(deadline, listId) {
      const list = document.getElementById(listId);
      const group = tasks
        .filter(task => task.deadline === deadline)
        .sort((a, b) => a.order - b.order);

      list.innerHTML = "";

      if (group.length === 0) {
        list.innerHTML = '<div class="empty-message">タスクはありません</div>';
        return;
      }

      group.forEach((task, index) => {
        const card = document.createElement("div");
        card.className = "task-card" + (task.done ? " done" : "");
        card.dataset.taskId = task.id;

        card.innerHTML = `
          <div class="task-header">
            <input type="checkbox" ${task.done ? "checked" : ""} onchange="toggleDone(${task.id})" />
            <div class="task-title">${escapeHtml(task.title)}</div>
          </div>
        <div class="task-body">
          ${task.memo ? `<div class="task-memo">${escapeHtml(task.memo)}</div>` : ""}
          <div class="task-actions">
            <button class="small-btn move-btn" onclick="moveTask(${task.id}, -1)" ${index === 0 ? "disabled" : ""}>上へ</button>
            <button class="small-btn move-btn" onclick="moveTask(${task.id}, 1)" ${index === group.length - 1 ? "disabled" : ""}>下へ</button>
            <button class="small-btn edit-btn" onclick="editTask(${task.id})">更新</button>
            <button class="small-btn delete-btn" onclick="deleteTask(${task.id})">削除</button>
          </div>
        </div>
        `;

        list.appendChild(card);
      });
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    renderTasks();
  </script>
</body>
</html>
